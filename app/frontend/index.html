<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI Kommune 2024 — Verkehr in Echtzeit</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <h1>KI Kommune 2024</h1>
      </div>
      <p class="subtitle">Verkehr in Echtzeit — Karlsruhe</p>
    </div>

    <div class="timestamp-card">
      <span class="label">Aktuelle Zeit</span>
      <span id="current-timestamp" class="timestamp-value">--</span>
    </div>

    <div class="stats-section">
      <h2 class="section-title">Fahrzeuge</h2>
      <div class="stat-grid">
        <div class="stat-card" data-type="car">
          <img src="assets/car.png" alt="Auto" class="stat-icon">
          <div class="stat-info">
            <span class="stat-count" id="count-car">0</span>
            <span class="stat-label">Autos</span>
          </div>
        </div>
        <div class="stat-card" data-type="truck">
          <img src="assets/truck.png" alt="LKW" class="stat-icon">
          <div class="stat-info">
            <span class="stat-count" id="count-truck">0</span>
            <span class="stat-label">LKW</span>
          </div>
        </div>
        <div class="stat-card" data-type="motor_bike">
          <img src="assets/motor_bike.png" alt="Motorrad" class="stat-icon">
          <div class="stat-info">
            <span class="stat-count" id="count-motor_bike">0</span>
            <span class="stat-label">Motorräder</span>
          </div>
        </div>
        <div class="stat-card" data-type="bicycle">
          <img src="assets/bicycle.png" alt="Fahrrad" class="stat-icon">
          <div class="stat-info">
            <span class="stat-count" id="count-bicycle">0</span>
            <span class="stat-label">Fahrräder</span>
          </div>
        </div>
        <div class="stat-card" data-type="foot">
          <img src="assets/foot.png" alt="Fußgänger" class="stat-icon">
          <div class="stat-info">
            <span class="stat-count" id="count-foot">0</span>
            <span class="stat-label">Fußgänger</span>
          </div>
        </div>
      </div>
    </div>

    <div class="totals-section">
      <div class="total-card">
        <span class="total-label">Gesamt</span>
        <span class="total-value" id="total-vehicles">0</span>
      </div>
      <div class="total-card">
        <span class="total-label">Sensoren</span>
        <span class="total-value" id="active-sensors">0</span>
      </div>
    </div>

    <div class="connection-status">
      <span class="status-dot" id="ws-status-dot"></span>
      <span id="ws-status-text">Verbinde...</span>
    </div>
  </div>

  <div id="map"></div>

  <div id="controls-bar">
    <div class="controls-left">
      <button id="btn-pause" class="control-btn" title="Play/Pause">
        <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
        <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
      <div class="speed-group">
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="2">2x</button>
        <button class="speed-btn" data-speed="5">5x</button>
        <button class="speed-btn" data-speed="10">10x</button>
        <button class="speed-btn" data-speed="50">50x</button>
      </div>
    </div>
    <div class="controls-center">
      <span id="time-start" class="time-label">--</span>
      <div class="timeline-container">
        <div class="timeline-track" id="timeline-track">
          <div class="timeline-progress" id="timeline-progress"></div>
          <div class="timeline-thumb" id="timeline-thumb"></div>
        </div>
      </div>
      <span id="time-end" class="time-label">--</span>
    </div>
    <div class="controls-right">
      <span id="step-counter" class="step-info">Step 0 / 0</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
